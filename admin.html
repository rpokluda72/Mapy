<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mapy Admin</title>
<!-- Static-mode data: loaded from pre-generated snapshots when opened as file:// -->
<script src="folders_data.js"></script>
<script src="data.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #f0f2f5; color: #222; }

/* Tab bar */
.tabs { display: flex; border-bottom: 2px solid #0066cc; background: #fff; padding: 0 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.tab-btn { padding: 11px 22px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .15s; }
.tab-btn:hover { color: #0066cc; }
.tab-btn.active { color: #0066cc; border-bottom-color: #0066cc; }

/* Panels */
.tab-panel { display: none; padding: 16px 20px; max-width: 1100px; }
.tab-panel.active { display: block; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar h2 { font-size: 16px; font-weight: 600; flex: 1; min-width: 0; }
.btn { padding: 5px 13px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; font-size: 13px; background: #fff; transition: background .1s; white-space: nowrap; }
.btn:hover { background: #f0f0f0; }
.btn-primary { background: #0066cc; color: #fff; border-color: #0055aa; }
.btn-primary:hover { background: #0055aa; }
.btn-dl { background: #e8f0fe; border-color: #4a90d9; color: #1a5fa8; }
.btn-dl:hover { background: #d2e3fc; }
.btn-all-y { background: #e8f5e9; border-color: #81c784; color: #2e7d32; }
.btn-all-y:hover { background: #c8e6c9; }
.btn-all-n { background: #fafafa; border-color: #bbb; color: #666; }
.btn-all-n:hover { background: #efefef; }
.btn-all-f { background: #e3f2fd; border-color: #64b5f6; color: #1565c0; }
.btn-all-f:hover { background: #bbdefb; }
.status-msg { font-size: 13px; color: #555; }
.status-msg.ok { color: #2e7d32; font-weight: 600; }
.status-msg.err { color: #c62828; font-weight: 600; }
.static-badge { font-size: 11px; padding: 2px 7px; background: #fff8e1; border: 1px solid #f0c040; color: #795548; border-radius: 3px; }

/* ── Type count pills (shared by both tabs) ── */
.folder-type-counts { display:flex; gap:4px; align-items:center; flex-shrink:0; }
.ftc { display:flex; align-items:center; gap:3px; background:#eef0f3; border-radius:10px; padding:2px 8px; white-space:nowrap; }
.ftc .type-icon-img { width:16px; height:16px; }
.ftc-num { font-size:13px; color:#444; font-weight:600; }

/* ── Folders tab ── */
.folder-block { background: #fff; border-radius: 7px; border: 1px solid #dde; margin-bottom: 8px; overflow: hidden; }

.folder-row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; cursor: pointer;
  background: #f4f6fa; border-bottom: 1px solid #e8e8e8;
  user-select: none;
}
.folder-row:hover { background: #e8f0fe; }
.folder-row .arrow { font-size: 11px; width: 14px; flex-shrink: 0; transition: transform .15s; color: #666; }
.folder-row.open .arrow { transform: rotate(90deg); }
.folder-name { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.yn-count { font-size: 12px; white-space: nowrap; }
.yn-y-count { color: #2e7d32; font-weight: 600; }
.yn-n-count { color: #aaa; }
.folder-actions { display: flex; gap: 4px; align-items: center; }

.maps-list { display: none; }
.maps-list.open { display: block; }
.map-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 38px; border-bottom: 1px solid #f2f2f2;
}
.map-row:last-child { border-bottom: none; }
.map-row:hover { background: #fafafa; }
.map-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }

/* Y/N/F toggle */
.yn { width: 34px; height: 24px; border-radius: 4px; border: 1px solid; cursor: pointer; font-size: 12px; font-weight: 700; text-align: center; line-height: 22px; flex-shrink: 0; transition: background .1s; }
.yn.y { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
.yn.n { background: #f7f7f7; border-color: #ccc; color: #aaa; }
.yn.f { background: #e3f2fd; border-color: #64b5f6; color: #1565c0; }

/* small inline buttons */
.ibtn { font-size: 11px; padding: 2px 7px; border-radius: 3px; border: 1px solid #bbb; background: #fff; cursor: pointer; color: #555; white-space: nowrap; }
.ibtn:hover { background: #e8f0fe; border-color: #0066cc; color: #0066cc; }
.ibtn.iy { background: #f0faf0; border-color: #81c784; color: #2e7d32; }
.ibtn.in_ { background: #f5f5f5; border-color: #ccc; color: #888; }

/* move up/down buttons */
.move-btns { display:flex; flex-direction:row; gap:2px; flex-shrink:0; }
.move-btn { font-size:11px; width:24px; height:22px; padding:0; line-height:1; border-radius:3px; border:1px solid #ccc; background:#f9f9f9; cursor:pointer; color:#666; }
.move-btn:hover:not(:disabled) { background:#e8f0fe; border-color:#0066cc; color:#0066cc; }
.move-btn:disabled { opacity:.25; cursor:default; }

/* ── Data filter bar ── */
.data-filter-bar {
  display: flex; flex-direction: column; gap: 5px;
  padding: 9px 14px 8px; background: #f4f6fa;
  border: 1px solid #dde; border-radius: 6px; margin-bottom: 12px;
}
.filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
.filter-label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
.filter-item { display: flex; align-items: center; gap: 4px; font-size: 14px; cursor: pointer; user-select: none; white-space: nowrap; }
.filter-item input { cursor: pointer; width: 14px; height: 14px; }
.filter-item img { width: 18px; height: 18px; object-fit: contain; }

/* ── Data tab ── */
.data-folder { background: #fff; border-radius: 7px; border: 1px solid #dde; margin-bottom: 8px; overflow: hidden; }
.data-folder-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; cursor: pointer; background: #f4f6fa;
  border-bottom: 1px solid #e8e8e8; user-select: none;
}
.data-folder-hdr:hover { background: #e8f0fe; }
.data-folder-hdr .arrow { font-size: 11px; width: 14px; flex-shrink: 0; transition: transform .15s; color: #666; }
.data-folder-hdr.open .arrow { transform: rotate(90deg); }
.data-maps { display: none; }
.data-maps.open { display: block; }

.data-map-row {
  display: grid;
  grid-template-columns: 22px 1fr auto auto auto;
  gap: 10px; align-items: start;
  padding: 7px 14px 7px 34px; border-top: 1px solid #f2f2f2; font-size: 13px;
}
.data-map-row:hover { background: #fafafa; }
.data-map-row.is-hidden { opacity: 0.45; }
.data-map-row.is-hidden .map-title { text-decoration: line-through; }

.data-hide-btn {
  background: none; border: none; cursor: pointer; font-size: 15px;
  color: #ccc; padding: 0 3px; line-height: 1; border-radius: 3px; flex-shrink: 0;
  align-self: center;
}
.data-map-row:hover .data-hide-btn { color: #c0392b; }
.data-hide-btn:hover { background: #fde8e6; color: #c0392b; }
.data-hide-btn.restore { color: #ccc; }
.data-map-row:hover .data-hide-btn.restore { color: #1a7340; }
.data-hide-btn.restore:hover { background: #e8f5ee; color: #1a7340; }

.data-folder-hide-btn {
  display: none; background: none; border: none; cursor: pointer; font-size: 15px;
  color: #c0392b; padding: 0 4px; line-height: 1; border-radius: 3px; flex-shrink: 0;
}
.data-folder-hdr:hover .data-folder-hide-btn { display: inline; }
.data-folder-hide-btn:hover { background: #fde8e6; }
.data-folder-hide-btn.restore { color: #1a7340; }
.data-folder-hide-btn.restore:hover { background: #e8f5ee; }
.data-folder.is-hidden .data-folder-hdr { opacity: 0.5; }
.data-folder.is-hidden .data-folder-hdr strong { text-decoration: line-through; }
.type-icon-img { width: 18px; height: 18px; object-fit: contain; margin-top: 1px; }
.map-title { font-weight: 500; line-height: 1.4; }
.map-desc { color: #888; font-size: 12px; }
.map-note-line { color: #856404; font-size: 12px; font-style: italic; margin-top: 1px; }

.tags { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
.tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; line-height: 1.5; }
.tag-hidden { background: #fce4ec; color: #b71c1c; }
.tag-note { background: #fff8e1; color: #795548; }

.share-link { font-size: 12px; color: #0066cc; text-decoration: none; display: block; text-align: right; }
.share-link:hover { text-decoration: underline; }
.no-link { color: #ccc; font-size: 12px; text-align: right; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('data')">Data viewer</button>
  <button class="tab-btn" onclick="showTab('folders')">Folders — include flags</button>
</div>

<div id="tab-folders" class="tab-panel">
  <div class="toolbar">
    <h2>folders.json</h2>
    <button class="btn" id="expand-folders-btn" onclick="toggleExpandFolders()">Expand all</button>
    <button class="btn btn-all-y" onclick="setAll('Y')">All folders Y</button>
    <button class="btn btn-all-f" onclick="setAllFolders('F')">All folders F</button>
    <button class="btn btn-all-n" onclick="setAll('N')">All folders N</button>
    <button class="btn btn-primary" id="save-btn" onclick="save()">Save</button>
    <span id="status" class="status-msg"></span>
  </div>
  <div id="folder-list"></div>
</div>

<div id="tab-data" class="tab-panel active">
  <div class="toolbar">
    <h2>mapy_data.json</h2>
    <button class="btn" id="expand-data-btn" onclick="toggleExpandData()">Expand all</button>
    <span id="data-summary" class="status-msg"></span>
  </div>
  <div class="data-filter-bar">
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="display:flex;flex-direction:column;gap:5px;flex:1;">
        <div class="filter-row">
          <span class="filter-label">Filter:</span>
          <label class="filter-item"><input type="checkbox" class="data-filter-cb" data-type="car" checked><img src="icons/route-car-2-icon.png" alt=""> Car</label>
          <label class="filter-item"><input type="checkbox" class="data-filter-cb" data-type="bike" checked><img src="icons/route-cyc-2-icon.png" alt=""> Bike</label>
          <label class="filter-item"><input type="checkbox" class="data-filter-cb" data-type="hiking" checked><img src="icons/route-ped-2-icon.png" alt=""> Walk</label>
          <label class="filter-item"><input type="checkbox" class="data-filter-cb" data-type="other" checked><img src="icons/route-adr-2-icon.png" alt=""> Other</label>
        </div>
        <div class="filter-row">
          <span class="filter-label">Show:</span>
          <label class="filter-item"><input type="radio" name="data-hidden-filter" value="active" checked> Active</label>
          <label class="filter-item"><input type="radio" name="data-hidden-filter" value="all"> All</label>
          <label class="filter-item"><input type="radio" name="data-hidden-filter" value="hidden"> Hidden</label>
        </div>
      </div>
      <span class="folder-type-counts" id="data-totals-pills"></span>
    </div>
  </div>
  <div id="data-list"></div>
</div>

<script>
// ── Mode detection ─────────────────────────────────────────────────────
// IS_STATIC: true when opened as file:// — use pre-generated JS globals,
// save falls back to "Download JSON"
const IS_STATIC = !window.location.protocol.startsWith('http');

// ── Tab switching ──────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['data','folders'][i] === name);
  });
  ['tab-data','tab-folders'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', ['data','folders'][i] === name);
  });
}

// ── Helpers ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: filename
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 60000);
}

// ── Folders tab ────────────────────────────────────────────────────────
let foldersData = null;
let foldersExpanded = false;

async function loadFolders() {
  try {
    if (!IS_STATIC) {
      // Server mode: always fetch live from disk
      const r = await fetch('/folders.json');
      foldersData = await r.json();
    // eslint-disable-next-line no-undef
    } else if (typeof FOLDERS_DATA !== 'undefined') {
      // Static mode: use pre-built snapshot
      // eslint-disable-next-line no-undef
      foldersData = JSON.parse(JSON.stringify(FOLDERS_DATA)); // deep copy
    } else {
      document.getElementById('folder-list').textContent =
        'Run "run build" to generate folders_data.js, then reload.';
      return;
    }
    renderFolders();
    if (IS_STATIC) {
      const btn = document.getElementById('save-btn');
      btn.textContent = 'Download JSON';
      btn.className = 'btn btn-dl';
    }
  } catch(e) {
    document.getElementById('folder-list').textContent =
      'Could not load folders.json — run build first (or start the server).';
  }
}

function ynCountHtml(folder, fi) {
  const y = folder.maps.filter(m => m.include === 'Y').length;
  const n = folder.maps.length - y;
  return `<span class="yn-count" id="ync-${fi}"><span class="yn-y-count">${y}Y</span>&thinsp;·&thinsp;<span class="yn-n-count">${n}N</span></span>`;
}

function updateFolderYN(fi) {
  const folder = foldersData.folders[fi];
  const el = document.getElementById(`ync-${fi}`);
  if (!el) return;
  const y = folder.maps.filter(m => m.include === 'Y').length;
  const n = folder.maps.length - y;
  el.innerHTML = `<span class="yn-y-count">${y}Y</span>&thinsp;·&thinsp;<span class="yn-n-count">${n}N</span>`;
}

function renderFolders() {
  const container = document.getElementById('folder-list');
  container.innerHTML = '';
  foldersData.folders.forEach((folder, fi) => {
    const block = document.createElement('div');
    block.className = 'folder-block';

    // Folder row
    const row = document.createElement('div');
    row.className = 'folder-row';
    const nFolders = foldersData.folders.length;
    row.innerHTML = `
      <div class="move-btns" onclick="event.stopPropagation()">
        <button class="move-btn" onclick="moveFolderUp(${fi})" ${fi===0?'disabled':''}>▲</button>
        <button class="move-btn" onclick="moveFolderDown(${fi})" ${fi===nFolders-1?'disabled':''}>▼</button>
      </div>
      <span class="arrow">▶</span>
      <span class="folder-name" title="${esc(folder.name)}">${esc(folder.name)}</span>
      ${ynCountHtml(folder, fi)}
      <div class="folder-actions" onclick="event.stopPropagation()">
        <button class="ibtn iy" onclick="setFolderAll(${fi},'Y')">All Y</button>
        <button class="ibtn in_" onclick="setFolderAll(${fi},'N')">All N</button>
        <button class="yn ${folder.include==='Y'?'y':folder.include==='F'?'f':'n'}" id="fi-${fi}" onclick="toggleFolder(${fi})" title="${folder.include==='F'?'F = folder screenshot only':''}">${folder.include}</button>
      </div>
    `;
    row.addEventListener('click', () => {
      row.classList.toggle('open');
      maps.classList.toggle('open');
    });

    // Maps
    const maps = document.createElement('div');
    maps.className = 'maps-list';
    maps.id = `maps-${fi}`;
    folder.maps.forEach((map, mi) => {
      const mrow = document.createElement('div');
      mrow.className = 'map-row';
      const nMaps = folder.maps.length;
      mrow.innerHTML = `
        <div class="move-btns" onclick="event.stopPropagation()">
          <button class="move-btn" onclick="moveMapUp(${fi},${mi})" ${mi===0?'disabled':''}>▲</button>
          <button class="move-btn" onclick="moveMapDown(${fi},${mi})" ${mi===nMaps-1?'disabled':''}>▼</button>
        </div>
        <span class="map-name" title="${esc(map.name)}">${esc(map.name)}</span>
        <button class="yn ${map.include==='Y'?'y':'n'}" id="mi-${fi}-${mi}" onclick="toggleMap(${fi},${mi})">${map.include}</button>
      `;
      maps.appendChild(mrow);
    });

    block.appendChild(row);
    block.appendChild(maps);
    container.appendChild(block);
  });
}

function setYnBtn(id, val) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.textContent = val;
  btn.className = `yn ${val==='Y'?'y':val==='F'?'f':'n'}`;
  btn.title = val==='F' ? 'F = folder screenshot only' : '';
}

function toggleFolder(fi) {
  const f = foldersData.folders[fi];
  f.include = f.include === 'Y' ? 'F' : f.include === 'F' ? 'N' : 'Y';
  setYnBtn(`fi-${fi}`, f.include);
}

function toggleMap(fi, mi) {
  const m = foldersData.folders[fi].maps[mi];
  m.include = m.include === 'Y' ? 'N' : 'Y';
  setYnBtn(`mi-${fi}-${mi}`, m.include);
  updateFolderYN(fi);
}

function setFolderAll(fi, val) {
  const folder = foldersData.folders[fi];
  folder.include = val;
  setYnBtn(`fi-${fi}`, val);
  folder.maps.forEach((m, mi) => {
    m.include = val;
    setYnBtn(`mi-${fi}-${mi}`, val);
  });
  updateFolderYN(fi);
}

function setAll(val) {
  foldersData.folders.forEach((_, fi) => setFolderAll(fi, val));
}

function setAllFolders(val) {
  foldersData.folders.forEach((folder, fi) => {
    folder.include = val;
    setYnBtn(`fi-${fi}`, val);
  });
}

function moveFolderUp(fi) {
  if (fi === 0) return;
  [foldersData.folders[fi], foldersData.folders[fi-1]] = [foldersData.folders[fi-1], foldersData.folders[fi]];
  renderFolders();
}
function moveFolderDown(fi) {
  if (fi >= foldersData.folders.length - 1) return;
  [foldersData.folders[fi], foldersData.folders[fi+1]] = [foldersData.folders[fi+1], foldersData.folders[fi]];
  renderFolders();
}
function moveMapUp(fi, mi) {
  const maps = foldersData.folders[fi].maps;
  if (mi === 0) return;
  [maps[mi], maps[mi-1]] = [maps[mi-1], maps[mi]];
  renderFolders();
}
function moveMapDown(fi, mi) {
  const maps = foldersData.folders[fi].maps;
  if (mi >= maps.length - 1) return;
  [maps[mi], maps[mi+1]] = [maps[mi+1], maps[mi]];
  renderFolders();
}

let foldersExpanded2 = false;
function toggleExpandFolders() {
  foldersExpanded2 = !foldersExpanded2;
  document.querySelectorAll('#folder-list .folder-row').forEach(r => r.classList.toggle('open', foldersExpanded2));
  document.querySelectorAll('#folder-list .maps-list').forEach(m => m.classList.toggle('open', foldersExpanded2));
  document.getElementById('expand-folders-btn').textContent = foldersExpanded2 ? 'Collapse all' : 'Expand all';
}

async function save() {
  if (IS_STATIC) {
    downloadJson(foldersData, 'folders.json');
    const status = document.getElementById('status');
    status.textContent = 'Downloaded — replace folders.json manually, then run build.';
    status.className = 'status-msg ok';
    setTimeout(() => { status.textContent = ''; }, 5000);
    return;
  }
  const status = document.getElementById('status');
  status.textContent = 'Saving…';
  status.className = 'status-msg';
  try {
    const r = await fetch('/api/folders', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(foldersData)
    });
    const d = await r.json();
    if (d.ok) {
      status.textContent = 'Saved ✓';
      status.className = 'status-msg ok';
    } else {
      status.textContent = 'Error: ' + (d.error || 'unknown');
      status.className = 'status-msg err';
    }
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'status-msg err';
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
}

// ── Data tab ───────────────────────────────────────────────────────────
const TYPE_ICONS = {
  bike:   'icons/route-cyc-2-icon.png',
  hiking: 'icons/route-ped-2-icon.png',
  car:    'icons/route-car-2-icon.png',
  adr:    'icons/route-adr-2-icon.png',
  '':     'icons/route-adr-2-icon.png',
};

let dataExpanded = false;
function toggleExpandData() {
  dataExpanded = !dataExpanded;
  document.querySelectorAll('#data-list .data-folder-hdr').forEach(h => h.classList.toggle('open', dataExpanded));
  document.querySelectorAll('#data-list .data-maps').forEach(m => m.classList.toggle('open', dataExpanded));
  document.getElementById('expand-data-btn').textContent = dataExpanded ? 'Collapse all' : 'Expand all';
}

let currentData = null;

async function loadData() {
  try {
    let data;
    // eslint-disable-next-line no-undef
    if (typeof DATA !== 'undefined') {
      // eslint-disable-next-line no-undef
      data = DATA;
    } else if (!IS_STATIC) {
      const r = await fetch('/mapy_data.json');
      data = await r.json();
    } else {
      document.getElementById('data-list').textContent =
        'Run "run build" to generate data.js, then reload.';
      return;
    }
    currentData = data;
    renderData(data);
  } catch(e) {
    document.getElementById('data-list').textContent =
      'Could not load mapy_data.json — run build first (or start the server).';
  }
}

function renderData(data) {
  const container = document.getElementById('data-list');
  container.innerHTML = '';
  const totalMaps = data.folders.reduce((s, f) => s + f.maps.length, 0);
  const withNotes = data.folders.reduce((s, f) => s + f.maps.filter(m => m.note).length, 0);
  document.getElementById('data-summary').textContent =
    `${data.folders.length} folders · ${totalMaps} maps · ${withNotes} notes`;

  data.folders.forEach((folder, fi) => {
    const div = document.createElement('div');
    div.className = 'data-folder' + (folder.hidden ? ' is-hidden' : '');
    div.id = `dfolder-${fi}`;
    div.dataset.hidden = String(!!folder.hidden);

    const hdr = document.createElement('div');
    hdr.className = 'data-folder-hdr';
    const fTags = [
      folder.note   ? `<span class="tag tag-note" title="${esc(folder.note)}">note</span>` : '',
      folder.hidden ? `<span class="tag tag-hidden" id="dfolder-htag-${fi}">hidden</span>` : `<span class="tag tag-hidden" id="dfolder-htag-${fi}" style="display:none">hidden</span>`,
    ].join('');
    const folderLink = folder.share_link
      ? `<a class="share-link" href="${esc(folder.share_link)}" target="_blank" onclick="event.stopPropagation()" style="margin-left:8px">${esc(folder.share_link.split('/').pop())}</a>`
      : '';
    const typePills = ['bike','hiking','car','adr'].map(tk => {
      const cnt = folder.maps.filter(m => m.type === tk).length;
      return cnt > 0
        ? `<span class="ftc" data-type="${tk}"><img src="${TYPE_ICONS[tk]}" class="type-icon-img" alt="${tk}"><span class="ftc-num">${cnt}</span></span>`
        : '';
    }).join('');
    const folderHideBtn = `<button class="data-folder-hide-btn${folder.hidden?' restore':''}" id="dfolder-hbtn-${fi}" onclick="event.stopPropagation(); toggleDataFolderHide(${fi})" title="${folder.hidden?'Restore folder':'Hide folder'}">${folder.hidden?'↩':'×'}</button>`;
    hdr.innerHTML = `
      <span class="arrow">▶</span>
      <strong>${esc(folder.name)}</strong>
      <span style="flex:1"></span>
      ${fTags}
      <span class="folder-type-counts">${typePills}</span>
      ${folderLink}
      ${folderHideBtn}
    `;
    hdr.addEventListener('click', () => {
      hdr.classList.toggle('open');
      mapsDiv.classList.toggle('open');
    });

    const mapsDiv = document.createElement('div');
    mapsDiv.className = 'data-maps';
    folder.maps.forEach((map, mi) => {
      const icon = TYPE_ICONS[map.type] || TYPE_ICONS[''];
      const typeKey = (map.type === 'adr' || !map.type) ? 'other' : map.type;
      const tags = [
        map.hidden ? `<span class="tag tag-hidden">hidden</span>` : '',
        map.note   ? `<span class="tag tag-note" title="${esc(map.note)}">note</span>` : '',
      ].join('');
      const linkHtml = map.share_link
        ? `<a class="share-link" href="${esc(map.share_link)}" target="_blank">${esc(map.share_link.split('/').pop())}</a>`
        : `<span class="no-link">—</span>`;
      const hideBtn = `<button class="data-hide-btn${map.hidden?' restore':''}" onclick="toggleDataHide(${fi},${mi})" title="${map.hidden?'Restore map':'Hide map'}">${map.hidden?'↩':'×'}</button>`;
      const row = document.createElement('div');
      row.className = 'data-map-row' + (map.hidden ? ' is-hidden' : '');
      row.id = `drow-${fi}-${mi}`;
      row.dataset.type = typeKey;
      row.dataset.hidden = String(!!map.hidden);
      row.innerHTML = `
        <img src="${icon}" class="type-icon-img" alt="${map.type||''}">
        <div>
          <div class="map-title">${esc(map.name)}</div>
          ${(map.description || map.elevation_ascent || map.elevation_descent) ? `<div class="map-desc">${esc([map.description, map.elevation_ascent ? '↑ ' + map.elevation_ascent + ' m' : '', map.elevation_descent ? '↓ ' + map.elevation_descent + ' m' : ''].filter(Boolean).join(' · '))}</div>` : ''}
          ${map.note        ? `<div class="map-note-line">${esc(map.note)}</div>` : ''}
        </div>
        <div class="tags">${tags}</div>
        <div>${linkHtml}</div>
        ${hideBtn}
      `;
      mapsDiv.appendChild(row);
    });

    div.appendChild(hdr);
    div.appendChild(mapsDiv);
    container.appendChild(div);
  });

  applyDataFilter();
}

function applyDataFilter() {
  const types = new Set();
  document.querySelectorAll('.data-filter-cb:checked').forEach(cb => types.add(cb.dataset.type));
  const showMode = document.querySelector('input[name="data-hidden-filter"]:checked')?.value || 'active';

  const totals = { car: 0, bike: 0, hiking: 0, other: 0 };

  document.querySelectorAll('#data-list .data-folder').forEach(folderEl => {
    const folderHidden = folderEl.dataset.hidden === 'true';

    let anyVisible = false;
    folderEl.querySelectorAll('.data-map-row').forEach(row => {
      const typeMatch = types.has(row.dataset.type);
      const mapHidden = row.dataset.hidden === 'true';
      const hiddenMatch = showMode === 'all'
        || (showMode === 'active' && !mapHidden)
        || (showMode === 'hidden' && mapHidden);
      const visible = typeMatch && hiddenMatch;
      row.style.display = visible ? '' : 'none';
      if (visible) anyVisible = true;
    });

    const folderVisible = showMode === 'active'
      ? (!folderHidden && anyVisible)
      : (anyVisible || (showMode === 'hidden' && folderHidden));
    folderEl.style.display = folderVisible ? '' : 'none';

    if (folderVisible) {
      folderEl.querySelectorAll('.data-map-row').forEach(row => {
        if (row.style.display !== 'none') totals[row.dataset.type] = (totals[row.dataset.type] || 0) + 1;
      });
    }
  });

  const iconMap = { car: 'icons/route-car-2-icon.png', bike: 'icons/route-cyc-2-icon.png', hiking: 'icons/route-ped-2-icon.png', other: 'icons/route-adr-2-icon.png' };
  const pillsEl = document.getElementById('data-totals-pills');
  if (pillsEl) {
    pillsEl.innerHTML = ['car','bike','hiking','other'].filter(t => totals[t] > 0).map(t =>
      `<span class="ftc"><img src="${iconMap[t]}" class="type-icon-img" alt="${t}"><span class="ftc-num">${totals[t]}</span></span>`
    ).join('');
  }
}

async function toggleDataFolderHide(fi) {
  const folder = currentData.folders[fi];
  const hidden = !folder.hidden;

  if (!IS_STATIC) {
    const r = await fetch('/api/hide', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type: 'folder', folder_index: fi, hidden})
    });
    if (r.ok) location.reload();
    else alert('Failed — is the server running? (run serve)');
    return;
  }

  // Static mode: toggle in memory and update DOM
  folder.hidden = hidden;
  const folderEl = document.getElementById(`dfolder-${fi}`);
  if (!folderEl) return;
  folderEl.dataset.hidden = String(hidden);
  folderEl.classList.toggle('is-hidden', hidden);
  const btn = document.getElementById(`dfolder-hbtn-${fi}`);
  if (btn) {
    btn.textContent = hidden ? '↩' : '×';
    btn.title = hidden ? 'Restore folder' : 'Hide folder';
    btn.classList.toggle('restore', hidden);
  }
  const tag = document.getElementById(`dfolder-htag-${fi}`);
  if (tag) tag.style.display = hidden ? '' : 'none';
  applyDataFilter();
}

async function toggleDataHide(fi, mi) {
  const map = currentData.folders[fi].maps[mi];
  const hidden = !map.hidden;

  if (!IS_STATIC) {
    const r = await fetch('/api/hide', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type: 'map', folder_index: fi, map_index: mi, hidden})
    });
    if (r.ok) location.reload();
    else alert('Failed — is the server running? (run serve)');
    return;
  }

  // Static mode: toggle in memory and update DOM
  map.hidden = hidden;
  const row = document.getElementById(`drow-${fi}-${mi}`);
  if (!row) return;
  row.dataset.hidden = String(hidden);
  row.classList.toggle('is-hidden', hidden);
  const btn = row.querySelector('.data-hide-btn');
  if (btn) {
    btn.textContent = hidden ? '↩' : '×';
    btn.title = hidden ? 'Restore map' : 'Hide map';
    btn.classList.toggle('restore', hidden);
  }
  const tagsEl = row.querySelector('.tags');
  if (tagsEl) {
    const existingTag = tagsEl.querySelector('.tag-hidden');
    if (hidden && !existingTag) {
      tagsEl.insertAdjacentHTML('afterbegin', '<span class="tag tag-hidden">hidden</span>');
    } else if (!hidden && existingTag) {
      existingTag.remove();
    }
  }
  applyDataFilter();
}

// ── Init ───────────────────────────────────────────────────────────────
loadFolders();
loadData();
document.querySelectorAll('.data-filter-cb, input[name="data-hidden-filter"]').forEach(el =>
  el.addEventListener('change', applyDataFilter));
</script>
</body>
